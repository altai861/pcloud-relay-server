services:
  relay:
    build:
      context: .
    image: pcloud-relay-server:latest
    restart: unless-stopped
    environment:
      PCLOUD_RELAY_BIND: 0.0.0.0:7070
      PCLOUD_RELAY_TOKEN: ${PCLOUD_RELAY_TOKEN:?set PCLOUD_RELAY_TOKEN in .env}
      PCLOUD_RELAY_REQUEST_TIMEOUT_SECONDS: ${PCLOUD_RELAY_REQUEST_TIMEOUT_SECONDS:-3600}
      PCLOUD_RELAY_MAX_BODY_BYTES: ${PCLOUD_RELAY_MAX_BODY_BYTES:-5368709120}
    ports:
      - "7070:7070"
